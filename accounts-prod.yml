resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state:
          seconds: 10
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 
          seconds: 0.5
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - java.lang.NullPointerException
  ratelimiter:
    configs:
      default:
        timeout-duration:
          seconds: 0
        limit-refresh-period:
          seconds: 5
        limit-for-period: 1
    instances:
      getJavaVersion:
        base-config: default
